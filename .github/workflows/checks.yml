name: PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.19'
      - name: Build
        run: go build
      - name: Test
        run: go test

  check_schema:
    name: Check Schema with Apollo Studio
    if: false
    needs: [ test ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # rename this to a valid subgraph name
      SUBGRAPH_NAME: foo-bar
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install Rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH
      - name: Schema Check
        run: rover subgraph check ${{ secrets.APOLLO_GRAPH_REF }} --schema graph/schema.graphqls --name ${{ env.SUBGRAPH_NAME }}
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}

  compose:
    name: Composition Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Install Rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH
      - name: Create supergraph config
        run: |
          cat > /tmp/supergraph.yaml << 'HEREDOC'
          federation_version: =2.10.0
          subgraphs:
            template:
              routing_url: http://localhost:8080
              schema:
                file: ./graph/schema.graphqls
          HEREDOC
      - name: Compose
        run: rover supergraph compose --config /tmp/supergraph.yaml
